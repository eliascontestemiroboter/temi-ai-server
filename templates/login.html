<!DOCTYPE html>
<html>
<head>
    <title>Temi Login</title>
    <style>
        body { font-family: Arial; background: #f0f0f0; text-align: center; padding-top: 100px; }
        .box { background: white; padding: 30px; width: 300px; margin: auto; border-radius: 10px; }
        input { width: 90%; padding: 10px; margin: 10px 0; }
        button { padding: 10px 20px; background: black; color: white; border: none; cursor: pointer; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Temi Login</h2>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">
            <input type="text" name="username" placeholder="Benutzername">
            <input type="password" name="password" placeholder="Passwort">
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
