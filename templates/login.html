<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Temi Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #1f2933, #020617);
            color: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .card {
            background: rgba(15, 23, 42, 0.9);
            border-radius: 16px;
            padding: 32px 28px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.3);
        }
        h1 {
            margin: 0 0 8px;
            font-size: 24px;
            text-align: center;
        }
        p.subtitle {
            margin: 0 0 24px;
            font-size: 13px;
            text-align: center;
            color: #9ca3af;
        }
        label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: #cbd5f5;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #4b5563;
            background: #020617;
            color: #e5e7eb;
            font-size: 14px;
            outline: none;
        }
        input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.4);
        }
        .field {
            margin-bottom: 16px;
        }
        button {
            width: 100%;
            padding: 10px 12px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover {
            opacity: 0.95;
        }
        .error {
            margin-top: 10px;
            font-size: 13px;
            color: #f97373;
            text-align: center;
        }
        .footer {
            margin-top: 18px;
            font-size: 11px;
            text-align: center;
            color: #6b7280;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Temi Dashboard</h1>
    <p class="subtitle">Login für Elias</p>
    <form method="post">
        <div class="field">
            <label for="username">Benutzername</label>
            <input id="username" name="username" type="text" placeholder="elias" required>
        </div>
        <div class="field">
            <label for="password">Passwort</label>
            <input id="password" name="password" type="password" placeholder="elias" required>
        </div>
        <button type="submit">Einloggen</button>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
    </form>
    <div class="footer">
        Temi Control Panel · privat · Elias
    </div>
</div>
</body>
</html>
