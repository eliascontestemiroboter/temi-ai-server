<!DOCTYPE html>
<html>
<head>
    <title>Temi Dashboard</title>
    <style>
        body { font-family: Arial; background: #fafafa; padding: 20px; }
        .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 10px; }
        h2 { margin-top: 0; }
        pre { background: #eee; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<h1>Temi Dashboard</h1>
<a href="/logout">Logout</a>

<div class="card">
    <h2>Tokenverbrauch</h2>
    <pre id="stats">Lade...</pre>
</div>

<div class="card">
    <h2>Logs</h2>
    <pre id="logs">Lade...</pre>
</div>

<div class="card">
    <h2>System Info</h2>
    <pre id="system">Lade...</pre>
</div>

<script>
async function loadStats() {
    let r = await fetch("/api/stats");
    let j = await r.json();
    document.getElementById("stats").textContent = JSON.stringify(j, null, 2);
}

async function loadLogs() {
    let r = await fetch("/api/logs");
    let j = await r.json();
    document.getElementById("logs").textContent = JSON.stringify(j, null, 2);
}

async function loadSystem() {
    let r = await fetch("/api/system");
    let j = await r.json();
    document.getElementById("system").textContent = JSON.stringify(j, null, 2);
}

setInterval(loadStats, 2000);
setInterval(loadLogs, 2000);
setInterval(loadSystem, 2000);

loadStats();
loadLogs();
loadSystem();
</script>

</body>
</html>
